<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AcreditaPro - Plataforma SaaS de acreditación documental y gestión de contratistas" />

    <!-- === Meta tags para PWA (Progressive Web App) === -->
    <meta name="theme-color" content="#1e40af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AcreditaPro" />

    <!-- === Open Graph / Redes Sociales === -->
    <meta property="og:title" content="AcreditaPro - Gestión de Acreditaciones" />
    <meta property="og:description" content="Plataforma SaaS de acreditación documental y gestión de contratistas" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_MX" />

    <!-- === Preconexión a recursos externos === -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- === Carga de Google Fonts (Inter) === -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- === Favicon === -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- === Título === -->
    <title>AcreditaPro | Gestión de Acreditaciones</title>
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <!-- Raíz de la aplicación React -->
    <div id="root"></div>

    <!-- Script principal - Vite lo transforma en el bundle -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
