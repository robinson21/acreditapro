services:
  - type: web
    name: acreditapro-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm ci && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push --accept-data-loss && npm run prisma:seed && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: acreditapro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://robinson21.github.io
      - key: APP_NAME
        value: AcreditaPro
      - key: UPLOAD_DIR
        value: /tmp/uploads

databases:
  - name: acreditapro-db
    plan: free
    region: oregon
    databaseName: acreditapro
    ipAllowList: []
