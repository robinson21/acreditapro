# =============================================================================
# AcreditaPro - NGINX Reverse Proxy Configuration
# =============================================================================
# Este archivo configura NGINX como proxy inverso para la aplicación.
# Sirve el frontend (build estático) y redirige /api al backend.
# =============================================================================

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # -----------------------------------------------------------------------
    # Configuración básica
    # -----------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Límites de seguridad
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Timeouts
    keepalive_timeout 65;
    send_timeout 30;
    proxy_connect_timeout 60;
    proxy_read_timeout 60;
    proxy_send_timeout 60;

    # Buffers
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # Compresión gzip
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype;
    gzip_proxied any;
    gzip_vary on;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------------
    # Servidor principal
    # -----------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Redirección a HTTPS si está configurado
        # return 301 https://$host$request_uri;

        # -------------------------------------------------------------------
        # Frontend - Archivos estáticos (build de producción)
        # -------------------------------------------------------------------
        root /usr/share/nginx/html;
        index index.html;

        # SPA: todas las rutas que no matcheen archivos estáticos
        # redirigen al index.html para que React Router maneje la ruta
        location / {
            try_files $uri $uri/ /index.html;

            # Cache de archivos estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # -------------------------------------------------------------------
        # Backend API - Proxy inverso
        # -------------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend:3001/;
            proxy_http_version 1.1;

            # Cabeceras para pasar la IP real del cliente
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # No cachear peticiones API
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # -------------------------------------------------------------------
        # Archivos subidos (estáticos)
        # -------------------------------------------------------------------
        location /uploads/ {
            proxy_pass http://backend:3001/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache de archivos por 1 hora
            expires 1h;
            add_header Cache-Control "public";
        }

        # -------------------------------------------------------------------
        # Denegar acceso a archivos sensibles
        # -------------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /(node_modules|src|.git) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # -----------------------------------------------------------------------
    # Servidor HTTPS (descomentar cuando se tengan certificados)
    # -----------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name acreditapro.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS (strict transport security)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # El resto de la configuración es igual que el servidor HTTP
    #     # (copiar location blocks de arriba)
    # }
}
